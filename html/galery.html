<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
       
       .img1{
            grid-area: img1}
       
       .img2{
            grid-area: img2}
       .img3{
            grid-area: img3}
       .img4{
            grid-area: img4}    
       .img5{
            grid-area: img5}
            
       .img6{
            grid-area: img6} 
       

       
       .container {

        
                display: grid;
                padding: 10%;
                gap: 8px;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: repeat(4, 200px);
                grid-template-areas: 
                      "img1 img3 img3"
                      "img1 img4 img6"
                      "img2 img2 img6"
                      "img5 img5 img5"



       }


    

      .img1 {

      grid-column-start: 1;
      grid-column-end: 3;


      }
    




       img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;

      
       }

      .container:hover .item img:not(:hover) {
            filter: grayscale(1);
            opacity: 0.5;
       }

    </style>



</head>





<body>
<div class="container"></div>
    <div class="item img1"><img src="https://images.unsplash.com/photo-1773332598289-ed0444ad1d6f?w=800&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxfHx8ZW58MHx8fHx8" alt=""></div>
    <div class="item img2"><img src="https://plus.unsplash.com/premium_photo-1676550476887-f240b8a1ca02?w=800&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwyfHx8ZW58MHx8fHx8" alt=""></div>
    <div class="item img3"><img src="https://images.unsplash.com/photo-1579762593217-46655e4e7efc?q=80&w=1817&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></div>
    <div class="item img4"><img src="https://images.unsplash.com/photo-1739611216842-05e54af86ec7?q=80&w=1459&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></div>
    <div class="item img5"><img src="https://plus.unsplash.com/premium_photo-1671132513039-c8dc6213cd44?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></div>
    <div class="item img6"><img src="https://images.unsplash.com/photo-1781644444361-b9dcee78b159?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></div>

    
</body>
</html>
