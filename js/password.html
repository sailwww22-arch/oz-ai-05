<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>



<body>
     <input type = "passowrd" placeholder="비밀번호 입력">
    
     
     <p> </p>
    <script>
         const input = document.querySelector("input")
         const p = document.querySelector("p")
         
         //validate : 유효성 검사
         function validatepassword() {
             // 비밀 번호가 4자리 미민인경우
             if (input.value.length < 4) {
                 p.textContent = "4자리 이상 입력하세요"
                 p.style.color = "red"
             // 비밀번호가 4자리 이상인 경우
             } else {
                p.textContent = "사용 가능한 비밀번호입니다"
                p.style.color = "blue"
             }


         }
    // input 태그에 입력이 있을 때마다 (input 이벤트가 일어난다)
    // 비밀번호 검사 함수를 실행한다    
    input.addEventListener("input", validatepassword)     


    </script>
    
</body>
</html>
